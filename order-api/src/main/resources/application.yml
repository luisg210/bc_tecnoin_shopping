spring:
  application:
    name: auth-api

server:
  port: 8080

cloud:
  gateway:
    routes:
      - id: employee-api
        uri: lb://EMPLOYEE-api
        predicates:
          - Path=/employees/**
      - id: department-api
        uri: lb://DEPARTMENT-api
        predicates:
          - Path=/departments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/