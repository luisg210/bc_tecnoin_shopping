spring.application.name=auth-api-dev
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/shopping_cart
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug
spring.jpa.properties.hibernate.format_sql=true
jakarta.persistence.validation.mode=none

# Auditoria
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.javax.persistence.validation.mode=none
# Activar auditoria
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=Z3sOhmRhZG9yLXR1LWaVanJldGUtY29uLXNvbG9yaW8tcGFyYS1sYS1jbGF2ZS1kZWotanVnaW1lbnRvLWhzNTEyLXNlY3JldA==
jwt.expiration=3600000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.exposure.exclude=env,beans
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoints.web.base-path=/actuator

# Custom info
info.app.name=auth-api
info.app.version=1.0.0
info.app.description=Authentication api

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.info.version=0.2.4
