spring.application.name=payment-api
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/shopping_cart
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug
spring.jpa.properties.hibernate.format_sql=true
jakarta.persistence.validation.mode=none

# Auditoria
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.javax.persistence.validation.mode=none
# Activar auditoria
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false

# Custom info
info.app.name=payment-api
info.app.version=1.0.0
info.app.description=payment api

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Feign client URLs
services.order.url=http://localhost:8084/api/v1/orders
services.order-detail.url=http://localhost:8085/api/v1/orders-detail
