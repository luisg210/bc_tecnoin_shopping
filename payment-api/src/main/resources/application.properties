spring.application.name=payment-api
server.port=8086

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug
spring.jpa.properties.hibernate.format_sql=true
jakarta.persistence.validation.mode=none

# Auditoria
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.javax.persistence.validation.mode=none
# Activar auditoria
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false

# Custom info
info.app.name=payment-api-prod
info.app.version=1.0.0
info.app.description=payment api

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Feign client URLs
services.order.url=http://order-service:8084/api/v1/orders
services.order-detail.url=http://detail-service:8085/api/v1/orders-detail

spring.kafka.bootstrap-servers=kafka:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
