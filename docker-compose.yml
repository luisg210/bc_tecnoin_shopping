services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopping_cart
    ports:
      - "3300:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "zookeeper", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - backend
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server=kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  gateway-service:
    build: ./gateway-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - JWT_SECRET=Z3sOhmRhZG9yLXR1LWaVanJldGUtY29uLXNvbG9yaW8tcGFyYS1sYS1jbGF2ZS1kZWotanVnaW1lbnRvLWhzNTEyLXNlY3JldA==
    ports:
      - "8080:8080"
    networks:
      - backend

  auth-service:
    build: ./auth-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_URL=jdbc:mysql://db:3306/shopping_cart
      - DB_USER=root
      - DB_PASSWORD=root
      - JWT_SECRET=Z3sOhmRhZG9yLXR1LWaVanJldGUtY29uLXNvbG9yaW8tcGFyYS1sYS1jbGF2ZS1kZWotanVnaW1lbnRvLWhzNTEyLXNlY3JldA==
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - backend

  customer-service:
    build: ./customer-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_URL=jdbc:mysql://db:3306/shopping_cart
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - backend

  product-service:
    build: ./product-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_URL=jdbc:mysql://db:3306/shopping_cart
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - backend

  order-service:
    build: ./order-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_URL=jdbc:mysql://db:3306/shopping_cart
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    networks:
      - backend

  detail-service:
    build: ./detail-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_URL=jdbc:mysql://db:3306/shopping_cart
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    networks:
      - backend

  payment-service:
    build: ./payment-api
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - DB_URL=jdbc:mysql://db:3306/shopping_cart
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8086:8086"
    networks:
      - backend

networks:
  backend:
    driver: bridge
