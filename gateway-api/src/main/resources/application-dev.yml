server:
  port: 8080

spring:
  config:
    activate:
      on-profile: dev
  application:
    name: gateway-api
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: customer-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/customers/**
            - id: product-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/products/**
            - id: order-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/orders/**
            - id: order-detail-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/orders-detail/**
            - id: payment-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/payments/**
          default-filters:
            - RemoveRequestHeader=Cookie

