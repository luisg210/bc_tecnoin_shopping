server:
  port: 8080

spring:
  profiles: dev
  application:
    name: gateway-api
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: customer-service
              uri: http://customer-service:8082
              predicates:
                - Path=/api/v1/customers/**
            - id: product-service
              uri: http://product-service:8083
              predicates:
                - Path=/api/v1/products/**
            - id: order-service
              uri: http://order-service:8084
              predicates:
                - Path=/api/v1/orders/**
            - id: order-detail-service
              uri: http://detail-service:8085
              predicates:
                - Path=/api/v1/orders-detail/**
            - id: payment-service
              uri: http://payment-service:8086
              predicates:
                - Path=/api/v1/payments/**
          default-filters:
            - RemoveRequestHeader=Cookie

jwt:
  secret: ${JWT_SECRET}
